version: '3.8'

services:
  mysql-container:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "1111"
      MYSQL_DATABASE: "ggulgguk"
    ports:
      - "3306:3306"
    networks:
      - my-network
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: 
      - "--init-file=/docker-entrypoint-initdb.d/init.sql"
      - "--default-authentication-plugin=mysql_native_password"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1111"]
      interval: 5s
      timeout: 10s
      retries: 10

  flask-app:
    build: .
    ports:
      - "5000:5000"
    networks:
      - my-network    
    environment:
      APP_CONFIG_FILE: "/app/config/development.py"
    depends_on:
      mysql-container:
        condition: service_healthy

networks:
  my-network:
    driver: bridge    

volumes:
  mysql_data:
